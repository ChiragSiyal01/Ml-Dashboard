<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Regression Results</title>

<style>
/* Page background */
body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Card container */
.card {
    background: #ffffff;
    width: 85%;
    max-width: 900px;
    padding: 35px;
    border-radius: 12px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    text-align: center;
}

/* Headings */
h1 {
    margin-bottom: 20px;
    color: #333;
}
h2 {
    margin-top: 35px;
    color: #444;
}

/* Images */
img {
    width: 80%;
    max-width: 650px;
    margin-top: 15px;
    border-radius: 10px;
    border: 2px solid #ddd;
    box-shadow: 0 5px 12px rgba(0,0,0,0.2);
}

/* Back button */
a {
    display: inline-block;
    margin-top: 35px;
    padding: 10px 25px;
    text-decoration: none;
    background: linear-gradient(135deg, #43cea2, #185a9d);
    color: white;
    border-radius: 8px;
    font-weight: bold;
}
a:hover {
    opacity: 0.9;
}
</style>
</head>

<body>

<div class="card">

    <h1>Regression Results</h1>

    <h2>Linear Regression</h2>
    <img src="{{ url_for('static', filename='graphs/regression/linear.png') }}">

    <h2>Polynomial Regression</h2>
    <img src="{{ url_for('static', filename='graphs/regression/polynomial.png') }}">

    <h2>SVR</h2>
    <img src="{{ url_for('static', filename='graphs/regression/svr.png') }}">

    <h2>Decision Tree</h2>
    <img src="{{ url_for('static', filename='graphs/regression/decision_tree.png') }}">

    <h2>Random Forest</h2>
    <img src="{{ url_for('static', filename='graphs/regression/random_forest.png') }}">

    <br>
    <a href="/">⬅ Back to Dashboard</a>

</div>

</body>
</html>
