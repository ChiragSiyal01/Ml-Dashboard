<!DOCTYPE html>
<html>
<head>
<title>Regression Results</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    text-align: center;
}

.container {
    background: white;
    color: black;
    margin: 40px auto;
    padding: 30px;
    width: 85%;
    border-radius: 12px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 30px;
}

img {
    width: 100%;
    border-radius: 10px;
}

.metrics {
    margin-top: 30px;
    padding: 20px;
    background: #f4f4f4;
    border-radius: 10px;
    text-align: left;
}

.best {
    background: #d4edda;
    padding: 10px;
    border-radius: 6px;
    font-weight: bold;
}
</style>

</head>
<body>

<div class="container">

<h1>Regression Results</h1>

<div class="grid">

    <div>
        <h3>Linear</h3>
        <img src="{{ url_for('static', filename='graphs/regression/linear.png') }}">
    </div>

    <div>
        <h3>Polynomial</h3>
<img src="{{ url_for('static', filename='graphs/regression/svr.png') }}">
    </div>

    <div>
        <h3>Decision Tree</h3>
        <img src="{{ url_for('static', filename='graphs/regression/decision_tree.png') }}">
    </div>

    <div>
        <h3>Random Forest</h3>
        <img src="{{ url_for('static', filename='graphs/regression/random_forest.png') }}">
    </div>

</div>

<div class="metrics">
    <h3>Model Performance</h3>
    <ul>
        {% for line in metrics %}
            {% if "Best Model" in line %}
                <li class="best">{{ line }}</li>
            {% else %}
                <li>{{ line }}</li>
            {% endif %}
        {% endfor %}
    </ul>
</div>

<br>
<a href="/">⬅ Back</a>

</div>

</body>
</html>
