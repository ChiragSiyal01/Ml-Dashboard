name: ML Dashboard CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ dev ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask pandas numpy matplotlib scikit-learn

    - name: Test Regression Script
      run: |
        mkdir -p uploads
        echo "x1,x2,y
        1,2,10
        2,3,15
        3,4,20" > uploads/test.csv
        python scripts/generate_regression.py uploads/test.csv

    - name: Test Classification Script
      run: |
        echo "a,b,c,label
        1,2,3,0
        2,3,4,1
        3,4,5,0" > uploads/test_class.csv
        python scripts/generate_classification.py uploads/test_class.csv

    - name: Done
      run: echo "CI/CD pipeline completed"
